name: CI / Publish

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install

      - name: Build extension
        run: pnpm run build

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Jest Tests
          path: test-results/junit.xml
          reporter: jest-junit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            coverage/lcov.info
            coverage/cobertura-coverage.xml
          if-no-files-found: warn

  publish-dev:
    needs: build-and-test
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install

      - name: Build extension
        run: pnpm run build

      - name: Generate test manifest
        run: pnpm run manifest:test

      - name: Package extension (dev)
        run: pnpm exec tfx extension create --manifest-globs azure-devops-extension.test.json

      - name: Publish to Marketplace (dev)
        uses: jessehouwing/azdo-marketplace@v6
        with:
          operation: publish
          token: ${{ secrets.MARKETPLACE_TOKEN }}
          publisher-id: josephjohnkarl
          extension-id: ado-tag-manager-develop
          manifest-file: azure-devops-extension.test.json

  publish:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install

      - name: Build extension
        run: pnpm run build

      - name: Package extension
        run: pnpm run package

      - name: Publish to Marketplace
        uses: jessehouwing/azdo-marketplace@v6
        with:
          operation: publish
          token: ${{ secrets.MARKETPLACE_TOKEN }}
          publisher-id: josephjohnkarl
          extension-id: ado-tag-manager
          manifest-file: azure-devops-extension.json
