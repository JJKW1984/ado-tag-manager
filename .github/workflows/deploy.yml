/name: Deploy Extension

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target extension to deploy
        required: true
        type: choice
        options:
          - dev
          - main
      organization_urls:
        description: "Azure DevOps organization URLs for share/install."
        required: false
        default: "https://dev.azure.com/josephjohnkarl0156/"

permissions:
  contents: read

env:
  PUBLISHER_ID: ${{ vars.PUBLISHER_ID }}

jobs:
  deploy:
    name: Share and Install Extension
    runs-on: ubuntu-latest

    steps:
      - id: resolve
        name: Resolve extension ID
        shell: bash
        run: |
          if [[ "${{ inputs.target }}" == "main" ]]; then
            echo "extension-id=ado-tag-manager" >> "$GITHUB_OUTPUT"
          else
            echo "extension-id=ado-tag-manager-develop" >> "$GITHUB_OUTPUT"
          fi

      - name: Share extension
        if: ${{ inputs.organization_urls != '' }}
        uses: jessehouwing/azdo-marketplace/share@main
        with:
          auth-type: pat
          token: ${{ secrets.MARKETPLACE_PAT }}
          publisher-id: ${{ env.PUBLISHER_ID }}
          extension-id: ${{ steps.resolve.outputs.extension-id }}
          accounts: ${{ inputs.organization_urls }}

      - name: Install extension
        if: ${{ inputs.organization_urls != '' }}
        uses: jessehouwing/azdo-marketplace/install@main
        with:
          auth-type: pat
          token: ${{ secrets.MARKETPLACE_PAT }}
          publisher-id: ${{ env.PUBLISHER_ID }}
          extension-id: ${{ steps.resolve.outputs.extension-id }}
          accounts: ${{ inputs.organization_urls }}

      - name: Wait for installation
        if: ${{ inputs.organization_urls != '' }}
        uses: jessehouwing/azdo-marketplace/wait-for-installation@main
        with:
          auth-type: pat
          token: ${{ secrets.MARKETPLACE_PAT }}
          publisher-id: ${{ env.PUBLISHER_ID }}
          extension-id: ${{ steps.resolve.outputs.extension-id }}
          accounts: ${{ inputs.organization_urls }}

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Extension Deploy Completed - ${{ inputs.target }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.EMAIL_FROM }}
          body: |
            Extension deployment completed successfully!
            
            Target: ${{ inputs.target }}
            Extension ID: ${{ steps.resolve.outputs.extension-id }}
            Organization URLs: ${{ inputs.organization_urls }}
            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      